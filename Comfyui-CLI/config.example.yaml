root: ""

comfyui:
  endpoint: "http://127.0.0.1:8188"
  base_path: ""
  default_profile: fast
  timeout_sec: 1800
  poll_interval_sec: 5.0

providers:
  local:
    enabled: true
  runninghub:
    enabled: false
    api_key: ""
    base_url: "https://www.runninghub.cn"

capabilities:
  image:
    default: wan2.1_txt2img
    t2i: wan2.1_txt2img
    i2i: sd15_img2img
  video:
    t2v: wan2.1_txt2vid
    i2v: wan2.1_img2vid
    fps: 16
  digital:
    compose: digital_image
    lip_sync: digital_combination
    customize: digital_customize

profiles:
  default:
    width: 832
    height: 480
    length: 49
    steps: 20
  fast:
    width: 512
    height: 288
    length: 25
    steps: 10

workflows_dir: workflows
data_workflows_dir: data/workflows
output_dir: outputs
