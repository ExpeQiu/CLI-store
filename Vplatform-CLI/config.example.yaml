llm:
  provider: openai_compatible
  base_url: ""
  api_key: ""
  model: "qwen-plus"

comfyui:
  endpoint: "http://127.0.0.1:8188"
  base_path: ""
  default_profile: fast
  timeout_sec: 1800
  poll_interval_sec: 5.0

provider:
  priority: [autodl, local, commercial]
  autodl_tunnel_script: ""  # 可选，如 scripts/autodl-tunnel.sh
  commercial_endpoint: ""

tts:
  provider: edge
  voice: zh-CN-XiaoxiaoNeural

subtitle:
  mode: edge

material:
  enabled: true
  pexels_api_keys: []
  fallback_after_failures: 2

pipeline:
  max_frames: 8
  stop_at_default: final
  bgm_dir: data/bgm
  keyframe_workflow: wan2.1_txt2img
  flux_workflow: flux_txt2img
  i2v_workflow: wan2.1_img2vid
  t2v_workflow: wan2.1_txt2vid
  fps: 16
  use_flux_keyframe: false
  profiles:
    default:
      width: 832
      height: 480
      length: 49
      steps: 20
    fast:
      width: 512
      height: 288
      length: 25
      steps: 10

tasks:
  max_concurrent_comfyui: 1
  log_dir: logs/tasks
